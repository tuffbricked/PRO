<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Registration | Beta Tech Solutions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h2>Product Registration Form</h2>
        <p>Please fill out the details below to register the new product.</p>
        <hr>

        <form action="/submit-registration" method="POST">
            <fieldset>
                <legend>Product Details</legend>
                
                <label for="prod-name">Product Name:</label>
                <input type="text" id="prod-name" name="product_name" required placeholder="e.g., Enterprise Router">

                <label for="prod-category">Category:</label>
                <select id="prod-category" name="category">
                    <option value="hardware">Hardware</option>
                    <option value="software">Software</option>
                    <option value="service">Service</option>
                </select>

                <label for="serial-number">Serial Number:</label>
                <input type="text" id="serial-number" name="serial_number" required>
            </fieldset>

            <fieldset>
                <legend>Purchase Information</legend>
                
                <label for="purchase-date">Date of Purchase:</label>
                <input type="date" id="purchase-date" name="purchase_date" required>

                <label for="supplier">Supplier/Vendor:</label>
                <input type="text" id="supplier" name="supplier_name">
            </fieldset>

            <div class="form-footer">
                <button type="submit">Register Product</button>
                <button type="reset" class="btn-secondary">Clear Form</button>
            </div>
        </form>
    </div>

</body>
</html>
