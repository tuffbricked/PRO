<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Feedback Form</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top right, rgba(116, 197, 248, 0.24), transparent 25%),
        linear-gradient(135deg, #17324d, #214f70);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    .page-shell {
      width: min(520px, 100%);
      position: relative;
    }

    .back-btn {
      display: inline-flex;
      margin-bottom: 18px;
      padding: 10px 16px;
      border-radius: 999px;
      color: #f6f8fb;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.14);
      transition: background 0.25s ease, transform 0.25s ease;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.22);
      transform: translateX(-3px);
    }

    .feedback-form {
      background: #fdfcf7;
      padding: 34px 30px;
      border-radius: 24px;
      box-shadow: 0 24px 48px rgba(7, 23, 39, 0.22);
    }

    .feedback-form h1 {
      margin-bottom: 10px;
      color: #14324c;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 2rem;
    }

    .feedback-form p {
      margin-bottom: 24px;
      color: #567089;
      line-height: 1.6;
    }

    .feedback-form label {
      display: block;
      margin-bottom: 8px;
      color: #18344d;
      font-weight: 700;
    }

    .feedback-form input,
    .feedback-form textarea {
      width: 100%;
      margin-bottom: 18px;
      padding: 13px 14px;
      border: 1px solid #cbd7e2;
      border-radius: 12px;
      font: inherit;
      background: white;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .feedback-form input:focus,
    .feedback-form textarea:focus {
      outline: none;
      border-color: #3d7da6;
      box-shadow: 0 0 0 4px rgba(61, 125, 166, 0.14);
    }

    .feedback-form button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #2f7caf, #1e5e89);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .feedback-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 24px rgba(30, 94, 137, 0.24);
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .feedback-form {
        padding: 26px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <a href="index.html" class="back-btn">&lt; Back to Home</a>

    <div class="feedback-form">
      <h1>Customer Feedback</h1>
      <p>Tell us what worked well and where we can improve. Every message helps us build a better experience.</p>

      <form>
        <label for="feedback-name">Full Name</label>
        <input type="text" id="feedback-name" name="name" placeholder="Enter your name" required>

        <label for="feedback-email">Email Address</label>
        <input type="email" id="feedback-email" name="email" placeholder="Enter your email" required>

        <label for="feedback-message">Your Feedback</label>
        <textarea id="feedback-message" name="feedback" rows="5" placeholder="Share your experience" required></textarea>

        <button type="submit">Submit Feedback</button>
      </form>
    </div>
  </div>
</body>
</html>
